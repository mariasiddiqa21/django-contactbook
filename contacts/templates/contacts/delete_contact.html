{% extends "contacts/base.html" %}
{% block content %}

<div class="container mt-5">

<div class="card shadow-lg p-4 text-center border-0">

<h3 class="text-danger">⚠ Delete Contact</h3>

<p>Are you sure you want to delete <strong>{{ contact.name }}</strong>?</p>

<form method="POST">

{% csrf_token %}

<button class="btn btn-danger">
<i class="fa fa-trash"></i> Yes Delete
</button>

<a href="{% url 'contact_list' %}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

{% endblock %}
