{% extends "contacts/base.html" %}
{% block content %}

<div class="container mt-5">

<div class="card shadow-lg p-4 border-0">

<h3 class="mb-4 text-center">✏️ Edit Contact</h3>
<p>Manage your contacts easily</p>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label>Name</label>
<input type="text" name="name" value="{{ contact.name }}" class="form-control">
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" name="phone" value="{{ contact.phone }}" class="form-control">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" value="{{ contact.email }}" class="form-control">
</div>

<div class="text-center mt-4">

<button class="btn btn-success">
<i class="fa fa-save"></i> Update Contact
</button>

<a href="{% url 'contact_list' %}" class="btn btn-secondary">
Cancel
</a>

</div>

</form>

</div>

</div>

{% endblock %}
