{% extends "contacts/base.html" %}

{% block content %}

<h2 class="mb-4">My Contacts</h2>
<p>Manage your contacts easily</p>

<!-- Search bar -->
<div class="mb-4">
  <input 
    type="text" 
    id="search-input"
    placeholder="Search contact..." 
    class="form-control"
  >
</div>

<div class="row" id="contacts-container">
  {% for contact in contacts %}
  <div class="col-md-4 mb-4 contact-item">
    <div class="card contact-card p-3">
      <h5>{{ contact.name }}</h5>
      <p><i class="fa fa-phone"></i> {{ contact.phone }}</p>
      <p><i class="fa fa-envelope"></i> {{ contact.email }}</p>
      <div class="d-flex gap-2">
        <a href="{% url 'detail' contact.id %}" class="btn btn-primary btn-sm">View</a>
        <a href="{% url 'edit' contact.id %}" class="btn btn-warning btn-sm">Edit</a>
        <a href="{% url 'delete' contact.id %}" class="btn btn-danger btn-sm">Delete</a>
      </div>
    </div>
  </div>
  {% empty %}
  <p>No contacts found.</p>
  {% endfor %}
</div>

<script>
const input = document.getElementById('search-input');
const container = document.getElementById('contacts-container');

input.addEventListener('input', () => {
  const query = input.value.toLowerCase();

  const contacts = document.querySelectorAll('.contact-item');
  contacts.forEach(contact => {
    const name = contact.querySelector('h5').textContent.toLowerCase();
    if (name.includes(query)) {
      contact.style.display = 'block';
    } else {
      contact.style.display = 'none';
    }
  });
});
</script>

{% endblock content %}
